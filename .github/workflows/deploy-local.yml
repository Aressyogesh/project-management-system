name: Deploy to Local Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — TEST GATE
# Runs on every push and PR. Deploy will not start if this fails.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Backend Unit Tests
    runs-on: self-hosted

    steps:
      - name: Stop PM2 processes
        run: |
          pm2 stop pms-backend  2>$null; $true
          pm2 stop pms-frontend 2>$null; $true
        shell: pwsh

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests
        working-directory: backend
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — DEPLOY
# Runs only on push to main (not PRs). Requires test job to pass.
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy (self-hosted)
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      # ── 1. Stop PM2 before checkout so dist folder is not locked ────────────
      - name: Stop PM2 processes
        run: |
          pm2 stop pms-backend  2>$null; $true
          pm2 stop pms-frontend 2>$null; $true
        shell: pwsh

      # ── 2. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Backend ───────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Restart backend via PM2
        working-directory: backend
        run: |
          pm2 delete pms-backend 2>$null; $true
          pm2 start dist/src/main.js --name pms-backend
          pm2 save
        shell: pwsh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      # ── 3. Frontend ──────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_BASE_URL }}/api/v1

      - name: Copy frontend dist to fixed deploy folder
        run: |
          $src  = "$env:GITHUB_WORKSPACE\frontend\dist"
          $dest = "D:\pms-frontend"
          if (Test-Path $dest) { Remove-Item $dest -Recurse -Force }
          Copy-Item $src $dest -Recurse
        shell: pwsh

      - name: Restart frontend via PM2
        run: |
          npm install -g serve 2>$null; $true
          $serveMain = "$(npm root -g)/serve/build/main.js" -replace '\\','/'
          $cfg = "module.exports={apps:[{name:'pms-frontend',script:'$serveMain',args:'-s D:/pms-frontend -l 5173',cwd:'D:/'}]};"
          $cfg | Out-File -FilePath "D:/pms-frontend.config.js" -Encoding ASCII
          pm2 delete pms-frontend  2>$null; $true
          pm2 delete pms-ecosystem 2>$null; $true
          pm2 start "D:/pms-frontend.config.js"
          pm2 save
        shell: pwsh

      # ── 4. Health check (retry x3, 5s delay) ─────────────────────────────────
      - name: Health check — backend
        run: |
          $maxAttempts = 3
          $delay = 5
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:3000/api/v1/health" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed on attempt $i"
                exit 0
              }
            } catch {
              Write-Host "Attempt $i failed: $_"
            }
            if ($i -lt $maxAttempts) {
              Write-Host "Retrying in ${delay}s..."
              Start-Sleep -Seconds $delay
            }
          }
          Write-Host "Health check failed after $maxAttempts attempts"
          exit 1
        shell: pwsh

      # ── 5. Deployment summary ─────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          Write-Host "✅ Deployment complete"
          pm2 list
        shell: pwsh
