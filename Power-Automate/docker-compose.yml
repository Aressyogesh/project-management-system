version: "3.8"

services:
  activepieces:
    image: activepieces/activepieces:latest
    container_name: activepieces
    restart: unless-stopped
    ports:
      - "9091:80"
    environment:
      - AP_ENGINE_EXECUTABLE_PATH=dist/packages/engine/main.js
      - AP_JWT_SECRET=31BBB1C9F922C3CC7443B9D88BFC40454BB2CF02A93A711B6FF8391384B5BB69
      - AP_ENCRYPTION_KEY=2A8ADC51AE22748BC8A7F42CBD8B1400
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=postgres
      - AP_POSTGRES_PASSWORD=postgres
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_QUEUE_MODE=REDIS
      - AP_TRIGGER_DEFAULT_POLL_INTERVAL=5
      - AP_BACKEND_URL=http://203.193.165.229:9091
      - AP_FRONTEND_URL=http://203.193.165.229:9091
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: activepieces-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: activepieces-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
